<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narția Hartă</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-dark: #101010;
            --bg-sidebar: #1a1a1a;
            --border: #2c2c2c;
            --text: #e5e5e5;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: var(--bg-dark); color: var(--text);
            overflow: hidden;
        }

        #app { display: flex; width: 100vw; height: 100vh; }

        #sidebar {
            width: 320px; background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 1000;
        }

        .section-header {
            padding: 20px; border-bottom: 1px solid var(--border);
            font-size: 1rem; font-weight: bold; letter-spacing: 1px;
            text-align: center;
        }

        .categories-list { flex-grow: 1; overflow-y: auto; padding: 20px; }
        
        .cat-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px; background: var(--bg-dark);
            margin-bottom: 8px; border-radius: 4px;
            box-sizing: border-box;
        }
        .cat-label { display: flex; align-items: center; gap: 10px; cursor: pointer; width: 100%; }

        #map { flex-grow: 1; height: 100%; background-color: #0b0c10; }

        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: var(--bg-sidebar); color: var(--text);
            border: 1px solid var(--border); border-radius: 4px;
            font-family: 'Consolas', monospace;
        }

        .custom-pin-icon {
            background: none !important;
            border: none !important;
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="sidebar">
            <div class="section-header">NARȚIA HARTĂ</div>
            <div class="categories-list" id="categories-container"></div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- CALIBRARE ABSOLUTĂ PE BAZA COLȚURILOR ---
        const imgWidth = 1440;
        const imgHeight = 1080;
        const bounds = [[0, 0], [imgHeight, imgWidth]];

        // Limitele extreme calculate de tine în Minecraft
        const minX = -1344; // Extrema vestică (stânga)
        const maxX = 1487;  // Extrema estică (dreapta)
        const minZ = -880;  // Extrema nordică (sus)
        const maxZ = 1247;  // Extrema sudică (jos)

        function minecraftToLeaflet(x, z) {
            // Calculăm proporția (între 0 și 1) pentru axa X și Z
            const percentX = (x - minX) / (maxX - minX);
            const percentZ = (z - minZ) / (maxZ - minZ);

            // Transpunem pe dimensiunea imaginii (în pixeli)
            const lng = percentX * imgWidth;
            
            // Inversăm Latitudinea (Z-ul din Minecraft crește în jos, axa Y din Leaflet crește în sus)
            const lat = imgHeight - (percentZ * imgHeight);

            return [lat, lng];
        }

        // --- INIȚIALIZARE HARTĂ ---
        const map = L.map('map', {
            crs: L.CRS.Simple, minZoom: -1, maxZoom: 2,
            maxBounds: bounds, maxBoundsViscosity: 1.0
        });

        // Prevenim forțat cache-ul browserului
        const cacheBuster = new Date().getTime();
        L.imageOverlay('image_d8de1d.jpg?v=' + cacheBuster, bounds).addTo(map);
        
        // Setăm vizualizarea pe mijlocul imaginii la încărcare
        map.setView([imgHeight / 2, imgWidth / 2], 0);

        const layers = {
            orase: L.layerGroup().addTo(map),
            sate: L.layerGroup().addTo(map),
            baze: L.layerGroup().addTo(map),
            structuri: L.layerGroup().addTo(map),
            metro: L.layerGroup().addTo(map),
            port: L.layerGroup().addTo(map)
        };

        const categoriesMap = {
            orase: "Orașe",
            sate: "Sate",
            baze: "Baze",
            structuri: "Structuri",
            metro: "Metro",
            port: "Porturi"
        };

        const colorMap = {
            orase: "#ff4d4d",      
            sate: "#ff944d",       
            baze: "#ffeb3b",       
            structuri: "#4caf50",  
            metro: "#2196f3",      
            port: "#ba68c8"        
        };

        let lastFileContent = "";

        // Generare Pin
        function createPinIcon(color) {
            return L.divIcon({
                html: `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" 
                              fill="${color}" 
                              stroke="#000000" 
                              stroke-width="1" 
                              stroke-linejoin="round"/>
                       </svg>`,
                className: 'custom-pin-icon',
                iconSize: [26, 26],
                iconAnchor: [13, 26],
                popupAnchor: [0, -26]
            });
        }

        // --- SIDEBAR UI ---
        function initSidebar() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';
            Object.keys(categoriesMap).forEach(key => {
                const color = colorMap[key];
                container.innerHTML += `
                    <div class="cat-item" style="border-left: 4px solid ${color};">
                        <label class="cat-label" for="chk-${key}">
                            <input type="checkbox" id="chk-${key}" checked onchange="toggleLayer('${key}')">
