<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narția — Hartă</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-void:     #07080d;
            --bg-sidebar:  #0d0f18;
            --bg-card:     #12151f;
            --border:      #1e2235;
            --border-glow: #2a3050;
            --gold:        #c8a96e;
            --gold-dim:    #7d6540;
            --gold-bright: #e8c97e;
            --text:        #cfc4a8;
            --text-dim:    #7a7060;
            --text-bright: #ede3cc;
            --ruby:        #9b2335;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%; width: 100%;
            font-family: 'IM Fell English', 'Georgia', serif;
            background: var(--bg-void);
            color: var(--text);
            overflow: hidden;
        }

        #app { display: flex; width: 100vw; height: 100vh; }

        /* ──────────── SIDEBAR ──────────── */
        #sidebar {
            width: 290px;
            min-width: 290px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            position: relative;
            overflow: hidden;
        }

        /* Subtle corner ornament */
        #sidebar::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold), var(--gold-dim), transparent);
        }

        /* ──── Logo / Header ──── */
        .sidebar-header {
            padding: 28px 20px 22px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .header-eyebrow {
            font-family: 'Cinzel', serif;
            font-size: 0.6rem;
            letter-spacing: 4px;
            color: var(--gold-dim);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .header-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(200,169,110,0.3);
            line-height: 1;
        }

        .header-sub {
            margin-top: 8px;
            font-style: italic;
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        /* Ornament divider */
        .ornament {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 20px;
            margin: 14px 0;
        }
        .ornament-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-glow));
        }
        .ornament-line.right {
            background: linear-gradient(90deg, var(--border-glow), transparent);
        }
        .ornament-diamond {
            width: 6px; height: 6px;
            background: var(--gold-dim);
            transform: rotate(45deg);
            flex-shrink: 0;
        }

        /* ──── Category section ──── */
        .section-label {
            padding: 0 20px 10px;
            font-family: 'Cinzel', serif;
            font-size: 0.58rem;
            letter-spacing: 3px;
            color: var(--gold-dim);
            text-transform: uppercase;
        }

        .categories-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--gold-dim) transparent;
        }
        .categories-list::-webkit-scrollbar { width: 4px; }
        .categories-list::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

        .cat-item {
            display: flex;
            align-items: center;
            padding: 9px 12px;
            margin-bottom: 5px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 3px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
            overflow: hidden;
        }
        .cat-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
        }
        .cat-item:hover {
            border-color: var(--border-glow);
            background: #161928;
        }

        .cat-checkbox {
            appearance: none;
            width: 14px; height: 14px;
            border: 1px solid var(--gold-dim);
            border-radius: 2px;
            margin-right: 10px;
            flex-shrink: 0;
            cursor: pointer;
            position: relative;
            background: transparent;
            transition: background 0.15s, border-color 0.15s;
        }
        .cat-checkbox:checked {
            background: var(--gold-dim);
            border-color: var(--gold);
        }
        .cat-checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: -2px; left: 1px;
            font-size: 11px;
            color: var(--bg-void);
            font-weight: bold;
        }

        .cat-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
            box-shadow: 0 0 6px currentColor;
        }

        .cat-name {
            font-family: 'Cinzel', serif;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            flex: 1;
        }

        .cat-count {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            color: var(--text-dim);
            background: var(--bg-void);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1px 7px;
            min-width: 24px;
            text-align: center;
        }

        /* ──── Footer ──── */
        .sidebar-footer {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            font-size: 0.65rem;
            color: var(--text-dim);
            font-style: italic;
            text-align: center;
        }
        .footer-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ──────────── MAP ──────────── */
        #map {
            flex: 1;
            height: 100%;
            background: var(--bg-void);
        }

        /* ──────────── LEAFLET OVERRIDES ──────────── */
        .leaflet-popup-content-wrapper {
            background: #0c0e18 !important;
            border: 1px solid var(--border-glow) !important;
            border-radius: 4px !important;
            box-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(200,169,110,0.08) !important;
            padding: 0 !important;
            overflow: hidden !important;
            font-family: 'IM Fell English', Georgia, serif !important;
            min-width: 220px;
            max-width: 270px;
        }
        .leaflet-popup-content {
            margin: 0 !important;
            width: 100% !important;
        }
        .leaflet-popup-tip-container { display: none; }
        .leaflet-popup-close-button {
            color: var(--gold-dim) !important;
            font-size: 18px !important;
            right: 8px !important;
            top: 6px !important;
            z-index: 10;
        }
        .leaflet-popup-close-button:hover { color: var(--gold) !important; }

        /* ──────────── POPUP CARD ──────────── */
        .popup-card {
            display: flex;
            flex-direction: column;
        }

        .popup-banner {
            height: 4px;
            width: 100%;
        }

        .popup-thumb {
            width: 100%;
            height: 130px;
            object-fit: cover;
            display: block;
            border-bottom: 1px solid var(--border);
            background: #0a0c14;
        }

        .popup-thumb-placeholder {
            width: 100%;
            height: 70px;
            background: linear-gradient(135deg, #0d0f1a 0%, #1a1d2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border);
        }
        .popup-thumb-placeholder svg { opacity: 0.15; }

        .popup-body {
            padding: 14px 16px 16px;
        }

        .popup-type-badge {
            display: inline-block;
            font-family: 'Cinzel', serif;
            font-size: 0.55rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 2px;
            border: 1px solid currentColor;
            margin-bottom: 8px;
            opacity: 0.85;
        }

        .popup-name {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-bright);
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .popup-divider {
            height: 1px;
            background: linear-gradient(90deg, var(--border-glow), transparent);
            margin: 10px 0;
        }

        .popup-meta {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .popup-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.78rem;
        }
        .popup-row-icon {
            color: var(--gold-dim);
            font-size: 0.7rem;
            width: 14px;
            text-align: center;
            flex-shrink: 0;
        }
        .popup-row-label {
            color: var(--text-dim);
            font-style: italic;
            min-width: 62px;
        }
        .popup-row-value {
            color: var(--text);
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
        }

        .custom-pin-icon {
            background: none !important;
            border: none !important;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
        }
        .custom-pin-icon:hover { filter: drop-shadow(0 0 8px rgba(200,169,110,0.6)); }
    </style>
</head>
<body>
<div id="app">
    <div id="sidebar">
        <div class="sidebar-header">
            <div class="header-eyebrow">Regatul</div>
            <div class="header-title">Narția</div>
            <div class="header-sub">Cartografia Tărâmurilor Cunoscute</div>
        </div>

        <div class="ornament" style="margin-top:18px;">
            <div class="ornament-line"></div>
            <div class="ornament-diamond"></div>
            <div class="ornament-line right"></div>
        </div>

        <div class="section-label">Filtre</div>
        <div class="categories-list" id="categories-container"></div>

        <div class="sidebar-footer">
            <div class="footer-status">
                <div class="status-dot"></div>
                <span>Hartă sincronizată live</span>
            </div>
        </div>
    </div>
    <div id="map"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const minX = -1344, maxX = 1487, minZ = -880, maxZ = 1247;

    const categoriesMap = {
        oras:     "Orașe",
        sat:      "Sate",
        baza:     "Baze",
        structura:"Structuri",
        metro:    "Metrouri",
        port:     "Porturi",
        pod:      "Poduri"
    };

    const colorMap = {
        oras:      "#e05252",
        sat:       "#e8914a",
        baza:      "#d4c060",
        structura: "#5aaa6a",
        metro:     "#5b9de8",
        port:      "#b07ee0",
        pod:       "#e060a0"
    };

    const iconSVG = {
        oras:      `<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>`,
        sat:       `<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>`,
        default:   `<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>`
    };

    let map, layers;
    let lastFileContent = "";
    const markerCounts = {};

    function formatDate(raw) {
        if (!raw || raw.trim() === '') return null;
        const s = raw.trim().replace(/\D/g, '');
        if (s.length === 8) {
            const d = s.slice(0,2), m = s.slice(2,4), y = s.slice(4,8);
            const months = ['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec'];
            const mIdx = parseInt(m,10) - 1;
            return `${parseInt(d,10)} ${months[mIdx] || m} ${y}`;
        }
        return raw.trim();
    }

    function createPinIcon(color, size = 30) {
        const s = size;
        return L.divIcon({
            html: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <filter id="glow-${color.replace('#','')}">
                    <feGaussianBlur stdDeviation="1.5" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"
                    fill="${color}" stroke="#000" stroke-width="0.8" stroke-linejoin="round"
                    filter="url(#glow-${color.replace('#','')})"/>
            </svg>`,
            className: 'custom-pin-icon',
            iconSize: [s, s],
            iconAnchor: [s/2, s],
            popupAnchor: [0, -s]
        });
    }

    function buildPopup(point) {
        const color = colorMap[point.category] || '#888';
        const typeName = categoriesMap[point.category] || point.category;
        const dateStr = formatDate(point.date);
        const hasImage = point.image && point.image.trim() !== '';
        const hasDate = dateStr !== null;

        const imageSection = hasImage
            ? `<img class="popup-thumb" src="${point.image.trim()}" alt="${point.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
               <div class="popup-thumb-placeholder" style="display:none;">
                 <svg width="40" height="40" viewBox="0 0 24 24" fill="${color}"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
               </div>`
            : `<div class="popup-thumb-placeholder">
                 <svg width="40" height="40" viewBox="0 0 24 24" fill="${color}"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
               </div>`;

        return `
        <div class="popup-card">
            <div class="popup-banner" style="background: linear-gradient(90deg, ${color}66, ${color}22, transparent);"></div>
            ${imageSection}
            <div class="popup-body">
                <div class="popup-type-badge" style="color:${color}; border-color:${color}55;">${typeName}</div>
                <div class="popup-name">${point.name}</div>
                <div class="popup-divider"></div>
                <div class="popup-meta">
                    <div class="popup-row">
                        <span class="popup-row-icon">✦</span>
                        <span class="popup-row-label">Coordonate</span>
                        <span class="popup-row-value">X: ${point.x} &nbsp;|&nbsp; Z: ${point.z}</span>
                    </div>
                    ${hasDate ? `
                    <div class="popup-row">
                        <span class="popup-row-icon">◈</span>
                        <span class="popup-row-label">Construit</span>
                        <span class="popup-row-value">${dateStr}</span>
                    </div>` : ''}
                </div>
            </div>
        </div>`;
    }

    function initSidebar() {
        const container = document.getElementById('categories-container');
        container.innerHTML = '';
        Object.keys(categoriesMap).forEach(key => {
            const color = colorMap[key];
            const count = markerCounts[key] || 0;
            const div = document.createElement('div');
            div.className = 'cat-item';
            div.id = `cat-item-${key}`;
            div.style.setProperty('--c', color);
            div.innerHTML = `
                <div class="cat-dot" style="background:${color}; color:${color};"></div>
                <label class="cat-name" style="color:${color}; cursor:pointer;" for="chk-${key}">${categoriesMap[key]}</label>
                <span class="cat-count" id="count-${key}">${count}</span>
                <input type="checkbox" class="cat-checkbox" id="chk-${key}" checked onchange="toggleLayer('${key}')" style="margin-left:10px;">
            `;
            div.style.borderLeftColor = color + '66';
            container.appendChild(div);
        });
    }

    function updateCounts() {
        Object.keys(categoriesMap).forEach(key => {
            const el = document.getElementById('count-' + key);
            if (el) el.textContent = markerCounts[key] || 0;
        });
    }

    window.toggleLayer = function(key) {
        const item = document.getElementById('cat-item-' + key);
        const chk = document.getElementById('chk-' + key);
        if (map.hasLayer(layers[key])) {
            map.removeLayer(layers[key]);
            if (item) item.style.opacity = '0.45';
        } else {
            layers[key].addTo(map);
            if (item) item.style.opacity = '1';
        }
    }

    function minecraftToLeaflet(x, z, W, H) {
        const pX = (x - minX) / (maxX - minX);
        const pZ = (z - minZ) / (maxZ - minZ);
        return [H - pZ * H, pX * W];
    }

    function renderMarker(point, W, H) {
        const cat = point.category;
        if (!layers[cat]) return;
        const coords = minecraftToLeaflet(point.x, point.z, W, H);
        const color = colorMap[cat] || '#aaa';

        // Larger pins for cities & towns
        const size = (cat === 'oras') ? 34 : (cat === 'sat') ? 28 : 26;
        const icon = createPinIcon(color, size);

        L.marker(coords, { icon })
            .bindPopup(buildPopup(point), {
                maxWidth: 270,
                className: ''
            })
            .addTo(layers[cat]);

        markerCounts[cat] = (markerCounts[cat] || 0) + 1;
    }

    async function fetchLocalCSV(W, H) {
        try {
            const res = await fetch('./nartia_date.csv?t=' + Date.now(), { cache: "no-store" });
            if (!res.ok) return;
            const text = await res.text();
            if (text === lastFileContent) return;
            lastFileContent = text;

            Object.keys(layers).forEach(k => layers[k].clearLayers());
            Object.keys(categoriesMap).forEach(k => markerCounts[k] = 0);

            const lines = text.split('\n');
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line || line.startsWith('///')) continue;
                const parts = line.split(',');
                if (parts.length >= 4) {
                    renderMarker({
                        name:     parts[0].trim(),
                        category: parts[1].trim(),
                        x:        parseFloat(parts[2]),
                        z:        parseFloat(parts[3]),
                        date:     parts[4] ? parts[4].trim() : '',
                        image:    parts[5] ? parts[5].trim() : ''
                    }, W, H);
                }
            }
            updateCounts();
        } catch(e) {
            console.warn('Eroare CSV:', e);
        }
    }

    // Bootstrap
    const img = new Image();
    img.onload = function() {
        const W = this.width, H = this.height;
        const bounds = [[0,0],[H,W]];

        map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -2, maxZoom: 3,
            maxBounds: bounds,
            maxBoundsViscosity: 0.9,
            zoomControl: true
        });

        L.imageOverlay('harta.png', bounds).addTo(map);
        map.setView([H/2, W/2], -1);

        layers = {};
        Object.keys(categoriesMap).forEach(k => {
            layers[k] = L.layerGroup().addTo(map);
            markerCounts[k] = 0;
        });

        initSidebar();
        fetchLocalCSV(W, H);
        setInterval(() => fetchLocalCSV(W, H), 3000);
    };
    img.onerror = () => {
        // Demo mode without harta.png — show a placeholder map
        const W = 2048, H = 1536;
        const bounds = [[0,0],[H,W]];
        map = L.map('map', {
            crs: L.CRS.Simple, minZoom: -2, maxZoom: 3,
            maxBounds: bounds, maxBoundsViscosity: 0.9
        });
        map.setView([H/2, W/2], -1);
        layers = {};
        Object.keys(categoriesMap).forEach(k => {
            layers[k] = L.layerGroup().addTo(map);
            markerCounts[k] = 0;
        });
        initSidebar();
        fetchLocalCSV(W, H);
        setInterval(() => fetchLocalCSV(W, H), 3000);
    };
    img.src = 'harta.png?v=' + Date.now();
</script>
</body>
</html>
