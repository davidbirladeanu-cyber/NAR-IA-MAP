<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Narția — Hartă</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:    #0e0e10;
            --panel: #141416;
            --line:  #222226;
            --line2: #2a2a2f;
            --text:  #e2e2e4;
            --muted: #5a5a62;
        }

        html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

        #app { display: flex; width: 100vw; height: 100vh; }

        /* ── Sidebar ── */
        #sidebar { width: 260px; min-width: 260px; background: var(--panel); border-right: 1px solid var(--line); display: flex; flex-direction: column; z-index: 1000; }
        .s-head { padding: 22px 20px 18px; border-bottom: 1px solid var(--line); }
        .s-title { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text); }
        .s-sub { margin-top: 3px; font-size: 11px; color: var(--muted); }
        .s-section { padding: 16px 20px 8px; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
        .s-list { flex: 1; overflow-y: auto; padding: 0 12px 12px; scrollbar-width: thin; scrollbar-color: var(--line2) transparent; }
        .cat-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; cursor: pointer; transition: background 0.1s; user-select: none; }
        .cat-row:hover { background: var(--line); }
        .cat-row.off { opacity: 0.35; }
        .cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .cat-name { flex: 1; font-size: 13px; color: var(--text); }
        .cat-count { font-size: 11px; color: var(--muted); min-width: 16px; text-align: right; }
        .s-foot { padding: 14px 20px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); }
        .pulse { width: 6px; height: 6px; border-radius: 50%; background: #3dba6f; animation: pulse 2.4s ease infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ── Timeline UI ── */
        .timeline-ctrl { padding: 16px 20px; border-bottom: 1px solid var(--line); display: flex; flex-direction: column; gap: 12px; }
        .timeline-header { display: flex; align-items: center; justify-content: space-between; }
        .btn-play { background: #3dba6f; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; outline: none; min-width: 78px; }
        .btn-play:hover { opacity: 0.8; }
        .anim-date-txt { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; }
        
        .slider-wrapper { display: none; width: 100%; }
        body.timeline-active .slider-wrapper { display: block; }
        input[type=range] { -webkit-appearance: none; background: var(--line2); height: 5px; border-radius: 3px; outline: none; width: 100%; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #3dba6f; cursor: pointer; border: 2px solid var(--panel); box-shadow: 0 0 0 1px var(--line2); }

        #map { flex: 1; height: 100%; background: var(--bg); transition: padding-top 0.3s; }

        /* mobile hidden on desktop */
        #mob-topbar, #mob-timeline-bar, #mob-fab, #drawer-backdrop, #drawer { display: none; }

        /* ── Mobile ── */
        @media (max-width: 640px) {
            #sidebar { display: none; }
            #mob-topbar { display: flex; position: fixed; top: 0; left: 0; right: 0; height: 52px; background: var(--panel); border-bottom: 1px solid var(--line); align-items: center; padding: 0 16px; z-index: 2000; gap: 12px; }
            .mob-title { font-size: 14px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; flex-shrink: 0; }
            .mob-live { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); margin-left: auto; }
            
            #mob-timeline-bar { position: fixed; top: 52px; left: 0; right: 0; background: var(--panel); border-bottom: 1px solid var(--line); padding: 10px 16px; z-index: 1999; display: none; align-items: center; }
            body.timeline-active #mob-timeline-bar { display: flex; }
            body.timeline-active #map { padding-top: 85px; }

            #app { flex-direction: column; }
            #map { width: 100%; height: 100%; padding-top: 52px; }
            #mob-fab { display: flex; position: fixed; bottom: 24px; right: 16px; width: 52px; height: 52px; background: var(--panel); border: 1px solid var(--line2); border-radius: 50%; align-items: center; justify-content: center; cursor: pointer; z-index: 2000; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
            #mob-fab svg { width: 22px; height: 22px; }
            #drawer-backdrop { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 2500; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
            #drawer-backdrop.open { opacity: 1; pointer-events: all; }
            #drawer { display: flex; flex-direction: column; position: fixed; left: 0; right: 0; bottom: 0; background: var(--panel); border-top: 1px solid var(--line2); border-radius: 16px 16px 0 0; z-index: 3000; max-height: 70vh; transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32,0.72,0,1); }
            #drawer.open { transform: translateY(0); }
            .drawer-handle { width: 36px; height: 4px; background: var(--line2); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
            .drawer-title { padding: 14px 20px 6px; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); flex-shrink: 0; }
            .drawer-list { overflow-y: auto; padding: 0 12px 28px; flex: 1; }
            .drawer-list .cat-row { padding: 12px 10px; }
            .drawer-list .cat-name { font-size: 15px; }
            .drawer-list .cat-count { font-size: 12px; }
        }

        /* ── Leaflet popup ── */
        .leaflet-popup-content-wrapper { background: var(--panel) !important; border: 1px solid var(--line2) !important; border-radius: 10px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.7) !important; padding: 0 !important; overflow: hidden !important; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important; min-width: 220px; max-width: 280px; }
        .leaflet-popup-content { margin: 0 !important; width: 100% !important; }
        .leaflet-popup-tip-container { display: none; }
        .leaflet-popup-close-button { color: var(--muted) !important; font-size: 18px !important; right: 10px !important; top: 8px !important; z-index: 10; width: 32px !important; height: 32px !important; }
        .leaflet-popup-close-button:hover { color: var(--text) !important; }

        /* ── Popup ── */
        .pc { display: flex; flex-direction: column; }
        .pc-accent { height: 3px; width: 100%; }
        .pc-img { width: 100%; height: 130px; object-fit: cover; display: block; background: var(--bg); }
        .pc-img-ph { width: 100%; height: 72px; background: var(--bg); display: flex; align-items: center; justify-content: center; }
        .pc-body { padding: 14px 16px 16px; }
        .pc-badge { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; margin-bottom: 8px; }
        .pc-name { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.25; margin-bottom: 12px; }
        .pc-sep { height: 1px; background: var(--line); margin-bottom: 10px; }
        .pc-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 5px; font-size: 12px; }
        .pc-label { color: var(--muted); min-width: 68px; flex-shrink: 0; }
        .pc-val { color: var(--text); font-variant-numeric: tabular-nums; }

        .custom-pin { background: none !important; border: none !important; }
    </style>
</head>
<body>
<div id="app">
    <div id="sidebar">
        <div class="s-head">
            <div class="s-title">Narția</div>
            <div class="s-sub">Hartă interactivă</div>
        </div>
        
        <div class="timeline-ctrl">
            <div class="timeline-header">
                <button class="btn-play" onclick="toggleTimeline()">▶ Play</button>
                <div class="anim-date-txt" style="display: none;"></div>
            </div>
            <div class="slider-wrapper">
                <input type="range" id="timeline-slider-desk" min="0" value="0" step="1" oninput="scrubTimeline(this.value)">
            </div>
        </div>

        <div class="s-section">Categorii</div>
        <div class="s-list" id="cat-list-desk"></div>
        <div class="s-foot"><div class="pulse"></div><span>Sincronizat live</span></div>
    </div>
    <div id="map"></div>
</div>

<div id="mob-topbar">
    <span class="mob-title">Narția</span>
    
    <button class="btn-play" style="padding: 4px 10px; min-width: auto;" onclick="toggleTimeline()">▶</button>
    <span class="anim-date-txt" style="display: none; flex: 1; font-size: 11px;"></span>
    
    <span class="mob-live"><div class="pulse"></div>Live</span>
</div>

<div id="mob-timeline-bar">
    <input type="range" id="timeline-slider-mob" min="0" value="0" step="1" style="width: 100%" oninput="scrubTimeline(this.value)">
</div>

<div id="mob-fab" onclick="toggleDrawer()">
    <svg viewBox="0 0 24 24" fill="none" stroke="#e2e2e4" stroke-width="1.8" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
</div>
<div id="drawer-backdrop" onclick="toggleDrawer()"></div>
<div id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-title">Categorii</div>
    <div class="drawer-list" id="cat-list-mob"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const minX=-1344, maxX=1487, minZ=-880, maxZ=1247;

const CATS = {
    oras:      { label: 'Orașe',     color: '#e05555' },  
    sat:       { label: 'Sate',      color: '#e07a30' },  
    baza:      { label: 'Baze',      color: '#c8b820' },  
    structura: { label: 'Structuri', color: '#4aaa40' },  
    metro:     { label: 'Metrouri',  color: '#2090d0' },  
    port:      { label: 'Porturi',   color: '#3060c8' },  
    pod:       { label: 'Poduri',    color: '#7040c0' },  
    drum:      { label: 'Drumuri',   color: '#a030b0' }   
};

let map, W, H;
let layers = {}, drumOverlay = null, visible = {}, lastCSV = '';
let drawerOpen = false;

// Variabile Timeline pe Zile
let datedMarkers = [];
let undatedMarkers = [];
let timelineDays = []; // Stochează fiecare zi în milisecunde
let isAnimating = false;
let animInterval = null;
let currentStep = -1; 

window.toggleDrawer = function() {
    drawerOpen = !drawerOpen;
    document.getElementById('drawer').classList.toggle('open', drawerOpen);
    document.getElementById('drawer-backdrop').classList.toggle('open', drawerOpen);
};

function pin(color) {
    const s = 26;
    return L.divIcon({
        html: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="${color}" stroke="#000" stroke-width="1.2" stroke-linejoin="round"/></svg>`,
        className: 'custom-pin',
        iconSize: [s,s], iconAnchor: [s/2,s], popupAnchor: [0,-s]
    });
}

function fmtDate(raw) {
    if (!raw || !raw.trim()) return null;
    const s = raw.trim().replace(/\D/g,'');
    if (s.length === 8) {
        const mo = ['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec'];
        return `${parseInt(s.slice(0,2))} ${mo[parseInt(s.slice(2,4))-1]||s.slice(2,4)} ${s.slice(4)}`;
    }
    return raw.trim();
}

// Transformă timestamp-ul în string formatat frumos pt UI-ul animației
function tsToDateString(ts) {
    if (!ts) return "Începuturi";
    const d = new Date(ts);
    const mo = ['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec'];
    return `${d.getDate()} ${mo[d.getMonth()]} ${d.getFullYear()}`;
}

function parseTimestamp(raw) {
    if (!raw || !raw.trim()) return 0; 
    const s = raw.trim().replace(/\D/g,'');
    // Generăm milisecunde la miezul nopții pentru ziua respectivă
    if (s.length === 8) return new Date(s.slice(4,8), parseInt(s.slice(2,4))-1, s.slice(0,2), 0, 0, 0, 0).getTime();
    return 0;
}

function buildPopup(p) {
    const c = CATS[p.cat] || { label: p.cat, color: '#888' };
    const col = c.color;
    const date = fmtDate(p.date);
    const hasImg = p.img && p.img.trim();
    const imgHtml = hasImg
        ? `<img class="pc-img" src="${p.img.trim()}" alt="${p.name}" onerror="this.style.display='none'">`
        : `<div class="pc-img-ph"><svg width="28" height="28" viewBox="0 0 24 24" fill="${col}" opacity="0.18"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg></div>`;
    return `<div class="pc">
        <div class="pc-accent" style="background:${col}"></div>
        ${imgHtml}
        <div class="pc-body">
            <div class="pc-badge" style="background:${col}22;color:${col}">${c.label}</div>
            <div class="pc-name">${p.name}</div>
            <div class="pc-sep"></div>
            ${p.cat !== 'drum' ? `<div class="pc-row"><span class="pc-label">Coordonate</span><span class="pc-val">X ${p.x} · Z ${p.z}</span></div>` : ''}
            ${date ? `<div class="pc-row"><span class="pc-label">Construit</span><span class="pc-val">${date}</span></div>` : ''}
        </div>
    </div>`;
}

function makeRow(k, isMobile) {
    const cat = CATS[k];
    const row = document.createElement('div');
    row.className = 'cat-row';
    row.id = (isMobile ? 'mob-' : 'desk-') + 'row-' + k;
    row.innerHTML = `<div class="cat-dot" style="background:${cat.color}"></div><span class="cat-name">${cat.label}</span><span class="cat-count" id="${isMobile?'mob-':'desk-'}cnt-${k}">0</span>`;
    row.addEventListener('click', () => { toggle(k); if (isMobile) toggleDrawer(); });
    return row;
}

function buildSidebar() {
    const desk = document.getElementById('cat-list-desk');
    const mob  = document.getElementById('cat-list-mob');
    desk.innerHTML = ''; mob.innerHTML = '';
    Object.keys(CATS).forEach(k => {
        desk.appendChild(makeRow(k, false));
        mob.appendChild(makeRow(k, true));
    });
}

function toggle(k) {
    visible[k] = !visible[k];
    ['desk-row-','mob-row-'].forEach(p => document.getElementById(p+k)?.classList.toggle('off', !visible[k]));

    if (k === 'drum') {
        if (drumOverlay) {
            if (visible[k]) drumOverlay.addTo(map);
            else map.removeLayer(drumOverlay);
        }
        return;
    }
    
    drawStep(currentStep);
}

// Updatează numărătoarea (pinurile fără dată se pun la total doar când isEnd este adevărat)
function updateCounts(currentTs, isEnd) {
    let tempCounts = {};
    Object.keys(CATS).forEach(k => tempCounts[k] = 0);
    
    datedMarkers.forEach(item => {
        if (item.ts <= currentTs) tempCounts[item.cat]++;
    });
    
    if (isEnd) {
        undatedMarkers.forEach(item => tempCounts[item.cat]++);
    }
    
    Object.keys(CATS).forEach(k => {
        const v = tempCounts[k];
        document.getElementById('desk-cnt-'+k) && (document.getElementById('desk-cnt-'+k).textContent = v);
        document.getElementById('mob-cnt-'+k)  && (document.getElementById('mob-cnt-'+k).textContent  = v);
    });
}

function mc2ll(x, z) {
    return [H - ((z - minZ) / (maxZ - minZ)) * H, ((x - minX) / (maxX - minX)) * W];
}

async function fetchCSV() {
    if (isAnimating) return;

    try {
        const r = await fetch('./nartia_date.csv?t=' + Date.now(), { cache:'no-store' });
        if (!r.ok) return;
        const text = await r.text();
        if (text === lastCSV) return;
        lastCSV = text;

        datedMarkers = [];
        undatedMarkers = [];
        let minTs = Infinity;
        let maxTs = 0;

        text.split('\n').slice(1).forEach(line => {
            line = line.trim();
            if (!line || line.startsWith('///')) return;
            const p = line.split(',').map(s => s.trim());
            if (p.length < 2) return;
            const name = p[0], cat = p[1];
            if (!CATS[cat] || cat === 'drum') return;
            if (p.length < 4) return;
            const x = +p[2], z = +p[3];
            if (isNaN(x) || isNaN(z)) return;
            
            const pt = { name, cat, x, z, date: p[4]||'', img: p[5]||'' };
            const ts = parseTimestamp(pt.date); 
            const marker = L.marker(mc2ll(x, z), { icon: pin(CATS[cat].color) })
                .bindPopup(buildPopup(pt), { maxWidth: 280 });
                
            if (ts > 0) {
                datedMarkers.push({ marker, cat, ts, pt });
                if (ts < minTs) minTs = ts;
                if (ts > maxTs) maxTs = ts;
            } else {
                undatedMarkers.push({ marker, cat, ts, pt });
            }
        });

        // Generăm array-ul cu FIECARĂ ZI dintre prima construcție și ultima
        timelineDays = [];
        if (minTs !== Infinity && maxTs !== 0) {
            let curr = new Date(minTs);
            const end = new Date(maxTs);
            curr.setHours(0,0,0,0);
            end.setHours(0,0,0,0);
            
            while (curr.getTime() <= end.getTime()) {
                timelineDays.push(curr.getTime());
                curr.setDate(curr.getDate() + 1); // adunăm o zi
            }
        }

        const maxStep = Math.max(0, timelineDays.length - 1);
        document.getElementById('timeline-slider-desk').max = maxStep;
        document.getElementById('timeline-slider-mob').max = maxStep;

        if (currentStep === -1 || currentStep > maxStep) currentStep = maxStep;

        drawStep(currentStep);
    } catch(e) { console.warn(e); }
}

function drawStep(step) {
    Object.keys(CATS).forEach(k => layers[k]?.clearLayers());
    
    // Luăm timestamp-ul din ziua corespunzătoare pe care se află slider-ul
    const currentTs = timelineDays[step] || 0;
    let dateText = currentTs ? tsToDateString(currentTs) : "Începuturi";
    
    // Flag care ne arată dacă suntem la finalul absolut al animației
    const isEnd = (step >= timelineDays.length - 1);

    // 1. Adăugăm pe hartă doar marker-ele construite PÂNĂ ÎN ziua respectivă (inclusiv)
    datedMarkers.forEach(item => {
        if (item.ts <= currentTs && visible[item.cat]) {
            item.marker.addTo(layers[item.cat]);
        }
    });

    // 2. Pinurile FĂRĂ dată apar DOAR la 100% din animație
    if (isEnd) {
        undatedMarkers.forEach(item => {
            if (visible[item.cat]) item.marker.addTo(layers[item.cat]);
        });
        dateText = "Evoluție completă";
    }

    document.querySelectorAll('.anim-date-txt').forEach(d => {
        d.style.display = 'block';
        d.textContent = dateText;
    });
    
    document.getElementById('timeline-slider-desk').value = step;
    document.getElementById('timeline-slider-mob').value = step;
    
    updateCounts(currentTs, isEnd);
}

function toggleTimeline() {
    if (isAnimating) pauseTimeline();
    else playTimeline();
}

function playTimeline() {
    if (timelineDays.length === 0) return;
    
    if (currentStep >= timelineDays.length - 1) currentStep = 0;
    
    isAnimating = true;
    document.body.classList.add('timeline-active'); 

    document.querySelectorAll('.btn-play').forEach(btn => {
        btn.innerHTML = '⏸ Pauză';
        btn.style.background = '#e07a30'; 
    });

    animInterval = setInterval(() => {
        currentStep++;
        drawStep(currentStep);
        
        if (currentStep >= timelineDays.length - 1) {
            pauseTimeline();
        }
    }, 500); // 500 milisecunde = Exact 2 zile pe secundă
}

function pauseTimeline() {
    isAnimating = false;
    clearInterval(animInterval);
    
    document.querySelectorAll('.btn-play').forEach(btn => {
        btn.innerHTML = '▶ Play';
        btn.style.background = '#3dba6f'; 
    });
}

function scrubTimeline(val) {
    pauseTimeline();
    document.body.classList.add('timeline-active'); 
    currentStep = parseInt(val);
    drawStep(currentStep);
}

function init(imgW, imgH) {
    W = imgW; H = imgH;
    map = L.map('map', { crs: L.CRS.Simple, minZoom:-2, maxZoom:3, maxBounds:[[0,0],[H,W]], maxBoundsViscosity:0.9, tap:true });
    L.imageOverlay('harta.png', [[0,0],[H,W]]).addTo(map);
    map.setView([H/2, W/2], -1);

    Object.keys(CATS).forEach(k => { layers[k] = L.layerGroup().addTo(map); visible[k] = true; });

    drumOverlay = L.imageOverlay('drum.png', [[0,0],[H,W]], { opacity: 0.9 }).addTo(map);

    buildSidebar();
    fetchCSV();
    setInterval(fetchCSV, 3000);
}

const img = new Image();
img.onload = function() { init(this.width, this.height); };
img.onerror = function() { init(2048, 1536); };
img.src = 'harta.png?v=' + Date.now();
</script>
</body>
</html>
