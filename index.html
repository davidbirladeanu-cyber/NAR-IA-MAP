<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narția — Hartă</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:    #0e0e10;
            --panel: #141416;
            --line:  #222226;
            --line2: #2a2a2f;
            --text:  #e2e2e4;
            --muted: #5a5a62;
        }

        html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
        #app { display: flex; width: 100vw; height: 100vh; }

        /* Sidebar */
        #sidebar { width: 260px; min-width: 260px; background: var(--panel); border-right: 1px solid var(--line); display: flex; flex-direction: column; z-index: 1000; }
        .s-head { padding: 22px 20px 18px; border-bottom: 1px solid var(--line); }
        .s-title { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text); }
        .s-sub { margin-top: 3px; font-size: 11px; color: var(--muted); }
        .s-section { padding: 16px 20px 8px; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
        .s-list { flex: 1; overflow-y: auto; padding: 0 12px 12px; scrollbar-width: thin; scrollbar-color: var(--line2) transparent; }
        .cat-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; cursor: pointer; transition: background 0.1s; user-select: none; }
        .cat-row:hover { background: var(--line); }
        .cat-row.off { opacity: 0.35; }
        .cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .cat-name { flex: 1; font-size: 13px; color: var(--text); }
        .cat-count { font-size: 11px; color: var(--muted); min-width: 16px; text-align: right; }

        /* drum row — dot e o linie orizontală */
        .cat-dot-road { width: 14px; height: 3px; border-radius: 2px; flex-shrink: 0; }

        .s-foot { padding: 14px 20px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); }
        .pulse { width: 6px; height: 6px; border-radius: 50%; background: #3dba6f; animation: pulse 2.4s ease infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        #map { flex: 1; height: 100%; background: var(--bg); }

        /* Leaflet popup */
        .leaflet-popup-content-wrapper {
            background: var(--panel) !important;
            border: 1px solid var(--line2) !important;
            border-radius: 10px !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7) !important;
            padding: 0 !important;
            overflow: hidden !important;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
            min-width: 220px;
            max-width: 260px;
        }
        .leaflet-popup-content { margin: 0 !important; width: 100% !important; }
        .leaflet-popup-tip-container { display: none; }
        .leaflet-popup-close-button { color: var(--muted) !important; font-size: 16px !important; right: 8px !important; top: 8px !important; z-index: 10; }
        .leaflet-popup-close-button:hover { color: var(--text) !important; }

        /* Popup card */
        .pc { display: flex; flex-direction: column; }
        .pc-accent { height: 3px; width: 100%; }

        /* Slideshow */
        .pc-slideshow { position: relative; width: 100%; height: 130px; background: var(--bg); overflow: hidden; }
        .pc-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s; }
        .pc-slide.active { opacity: 1; }
        .pc-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .pc-nav { position: absolute; bottom: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; background: linear-gradient(transparent, rgba(0,0,0,0.55)); }
        .pc-nav-btn { background: rgba(255,255,255,0.12); border: none; color: #fff; width: 22px; height: 22px; border-radius: 4px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .pc-nav-btn:hover { background: rgba(255,255,255,0.22); }
        .pc-dots { display: flex; gap: 4px; }
        .pc-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: background 0.15s; }
        .pc-dot.active { background: #fff; }

        /* single image (non-drum) */
        .pc-img { width: 100%; height: 120px; object-fit: cover; display: block; background: var(--bg); }
        .pc-img-ph { width: 100%; height: 72px; background: var(--bg); display: flex; align-items: center; justify-content: center; }

        .pc-body { padding: 14px 16px 16px; }
        .pc-badge { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; margin-bottom: 8px; }
        .pc-name { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.25; margin-bottom: 12px; }
        .pc-sep { height: 1px; background: var(--line); margin-bottom: 10px; }
        .pc-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 5px; font-size: 12px; }
        .pc-label { color: var(--muted); min-width: 68px; flex-shrink: 0; }
        .pc-val { color: var(--text); font-variant-numeric: tabular-nums; }

        .custom-pin { background: none !important; border: none !important; }
    </style>
</head>
<body>
<div id="app">
    <div id="sidebar">
        <div class="s-head">
            <div class="s-title">Narția</div>
            <div class="s-sub">Hartă interactivă</div>
        </div>
        <div class="s-section">Categorii</div>
        <div class="s-list" id="cat-list"></div>
        <div class="s-foot"><div class="pulse"></div><span>Sincronizat live</span></div>
    </div>
    <div id="map"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const minX=-1344, maxX=1487, minZ=-880, maxZ=1247;

const CATS = {
    oras:      { label: 'Orașe',     color: '#e05555' },
    sat:       { label: 'Sate',      color: '#e09045' },
    baza:      { label: 'Baze',      color: '#c8b840' },
    structura: { label: 'Structuri', color: '#4ea86a' },
    metro:     { label: 'Metrouri',  color: '#5590de' },
    port:      { label: 'Porturi',   color: '#9966d4' },
    pod:       { label: 'Poduri',    color: '#cc5090' },
    drum:      { label: 'Drumuri',   color: '#e8a030', isDrum: true }
};

let map, W, H;
let layers = {}, roadOverlays = {}, counts = {}, visible = {}, lastCSV = '';

// ── Pin ──────────────────────────────────────────
function pin(color) {
    const s = 26;
    return L.divIcon({
        html: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="${color}" stroke="#000" stroke-width="1.2" stroke-linejoin="round"/></svg>`,
        className: 'custom-pin',
        iconSize: [s,s], iconAnchor: [s/2,s], popupAnchor: [0,-s]
    });
}

// ── Date ─────────────────────────────────────────
function fmtDate(raw) {
    if (!raw || !raw.trim()) return null;
    const s = raw.trim().replace(/\D/g,'');
    if (s.length === 8) {
        const mo = ['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec'];
        return `${parseInt(s.slice(0,2))} ${mo[parseInt(s.slice(2,4))-1]||s.slice(2,4)} ${s.slice(4)}`;
    }
    return raw.trim();
}

// ── Popup normal ──────────────────────────────────
function popupNormal(p) {
    const c = CATS[p.cat] || { label: p.cat, color: '#888' };
    const col = c.color;
    const date = fmtDate(p.date);
    const hasImg = p.imgs && p.imgs[0] && p.imgs[0].trim();
    const imgHtml = hasImg
        ? `<img class="pc-img" src="${p.imgs[0].trim()}" alt="${p.name}" onerror="this.style.display='none'">`
        : `<div class="pc-img-ph"><svg width="28" height="28" viewBox="0 0 24 24" fill="${col}" opacity="0.18"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg></div>`;
    return `<div class="pc">
        <div class="pc-accent" style="background:${col}"></div>
        ${imgHtml}
        <div class="pc-body">
            <div class="pc-badge" style="background:${col}22;color:${col}">${c.label}</div>
            <div class="pc-name">${p.name}</div>
            <div class="pc-sep"></div>
            <div class="pc-row"><span class="pc-label">Coordonate</span><span class="pc-val">X ${p.x} · Z ${p.z}</span></div>
            ${date?`<div class="pc-row"><span class="pc-label">Construit</span><span class="pc-val">${date}</span></div>`:''}
        </div>
    </div>`;
}

// ── Popup drum cu slideshow ───────────────────────
let slideshowState = {}; // keyed by popup id

function popupDrum(p) {
    const col = CATS.drum.color;
    const imgs = p.imgs.filter(i => i.trim());
    const id = 'ss_' + Math.random().toString(36).slice(2);

    let slidesHtml = imgs.map((src, i) =>
        `<div class="pc-slide${i===0?' active':''}" data-idx="${i}"><img src="${src.trim()}" alt="${p.name}" loading="lazy"></div>`
    ).join('');

    let dotsHtml = imgs.length > 1
        ? imgs.map((_,i) => `<div class="pc-dot${i===0?' active':''}" onclick="ssGoto('${id}',${i})"></div>`).join('')
        : '';

    let navHtml = imgs.length > 1
        ? `<div class="pc-nav">
            <button class="pc-nav-btn" onclick="ssPrev('${id}')">&#8249;</button>
            <div class="pc-dots">${dotsHtml}</div>
            <button class="pc-nav-btn" onclick="ssNext('${id}')">&#8250;</button>
           </div>`
        : '';

    const slideshowHtml = imgs.length > 0
        ? `<div class="pc-slideshow" id="${id}">${slidesHtml}${navHtml}</div>`
        : `<div class="pc-img-ph"><svg width="28" height="28" viewBox="0 0 24 24" fill="${col}" opacity="0.18"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg></div>`;

    slideshowState[id] = { idx: 0, total: imgs.length };

    return `<div class="pc">
        <div class="pc-accent" style="background:${col}"></div>
        ${slideshowHtml}
        <div class="pc-body">
            <div class="pc-badge" style="background:${col}22;color:${col}">Drum</div>
            <div class="pc-name">${p.name}</div>
            <div class="pc-sep"></div>
            <div class="pc-row"><span class="pc-label">Imagini</span><span class="pc-val">${imgs.length > 0 ? imgs.length + ' foto' : '—'}</span></div>
        </div>
    </div>`;
}

// Slideshow helpers (global so onclick inline funcționează)
window.ssGoto = function(id, idx) {
    const el = document.getElementById(id);
    if (!el) return;
    const slides = el.querySelectorAll('.pc-slide');
    const dots = el.querySelectorAll('.pc-dot');
    slides.forEach(s => s.classList.remove('active'));
    dots.forEach(d => d.classList.remove('active'));
    if (slides[idx]) slides[idx].classList.add('active');
    if (dots[idx]) dots[idx].classList.add('active');
    slideshowState[id].idx = idx;
};
window.ssNext = function(id) {
    const st = slideshowState[id]; if (!st) return;
    ssGoto(id, (st.idx + 1) % st.total);
};
window.ssPrev = function(id) {
    const st = slideshowState[id]; if (!st) return;
    ssGoto(id, (st.idx - 1 + st.total) % st.total);
};

// ── Sidebar ───────────────────────────────────────
function buildSidebar() {
    const list = document.getElementById('cat-list');
    list.innerHTML = '';
    Object.keys(CATS).forEach(k => {
        const cat = CATS[k];
        const row = document.createElement('div');
        row.className = 'cat-row';
        row.id = 'row-' + k;
        const dotHtml = cat.isDrum
            ? `<div class="cat-dot-road" style="background:${cat.color}"></div>`
            : `<div class="cat-dot" style="background:${cat.color}"></div>`;
        row.innerHTML = `${dotHtml}<span class="cat-name">${cat.label}</span><span class="cat-count" id="cnt-${k}">0</span>`;
        row.addEventListener('click', () => toggle(k));
        list.appendChild(row);
    });
}

function toggle(k) {
    visible[k] = !visible[k];
    const row = document.getElementById('row-' + k);
    if (visible[k]) {
        if (CATS[k].isDrum) {
            Object.values(roadOverlays[k] || {}).forEach(ov => ov.addTo(map));
        }
        if (layers[k]) layers[k].addTo(map);
        row.classList.remove('off');
    } else {
        if (CATS[k].isDrum) {
            Object.values(roadOverlays[k] || {}).forEach(ov => map.removeLayer(ov));
        }
        if (layers[k]) map.removeLayer(layers[k]);
        row.classList.add('off');
    }
}

// ── Coords ───────────────────────────────────────
function mc2ll(x, z) {
    return [H - ((z - minZ) / (maxZ - minZ)) * H, ((x - minX) / (maxX - minX)) * W];
}

// ── CSV fetch ────────────────────────────────────
async function fetchCSV() {
    try {
        const r = await fetch('./nartia_date.csv?t=' + Date.now(), { cache:'no-store' });
        if (!r.ok) return;
        const text = await r.text();
        if (text === lastCSV) return;
        lastCSV = text;

        // Clear all
        Object.keys(CATS).forEach(k => {
            layers[k] && layers[k].clearLayers();
            counts[k] = 0;
            // Clear road overlays
            if (roadOverlays[k]) {
                Object.values(roadOverlays[k]).forEach(ov => map.removeLayer(ov));
                roadOverlays[k] = {};
            }
        });

        text.split('\n').slice(1).forEach(line => {
            line = line.trim();
            if (!line || line.startsWith('///')) return;
            const p = line.split(',').map(s => s.trim());
            if (p.length < 2) return;

            const name = p[0];
            const cat  = p[1];
            if (!CATS[cat]) return;

            if (cat === 'drum') {
                // format: Numele,drum,img1.jpg,img2.jpg,...
                const imgs = p.slice(2).filter(Boolean);
                if (!imgs.length) return;

                // Folosim prima imagine ca overlay pe hartă
                const overlayImg = imgs[0];

                // Adaugă imaginea ca overlay care acoperă toată harta
                // (fișierul e o imagine care se suprapune perfect peste harta PNG)
                if (!roadOverlays[cat]) roadOverlays[cat] = {};

                const ov = L.imageOverlay(overlayImg, [[0,0],[H,W]], { opacity: 0.85 });
                if (visible[cat]) ov.addTo(map);
                roadOverlays[cat][name] = ov;

                // Marker în centrul hărții ca punct de acces la popup
                // (poți muta X,Z dacă vrei un loc specific — momentan nu e în CSV)
                // Adăugăm un marker invizibil/mic în centru
                const markerLatLng = [H/2, W/2]; // fallback — nu avem coord pentru drum
                const pt = { name, cat, imgs };
                const mk = L.marker(markerLatLng, {
                    icon: pin(CATS.drum.color),
                    opacity: 0
                }).bindPopup(popupDrum(pt), { maxWidth: 260 });
                mk.addTo(layers[cat]);

                counts[cat] = (counts[cat] || 0) + 1;
            } else {
                // format normal: Nume,cat,x,z,data,img
                if (p.length < 4) return;
                const x = +p[2], z = +p[3];
                if (isNaN(x) || isNaN(z)) return;
                const pt = { name, cat, x, z, date: p[4]||'', imgs: p[5] ? [p[5]] : [] };
                L.marker(mc2ll(x, z), { icon: pin(CATS[cat]?.color || '#888') })
                    .bindPopup(popupNormal(pt), { maxWidth: 260 })
                    .addTo(layers[cat]);
                counts[cat] = (counts[cat] || 0) + 1;
            }
        });

        Object.keys(CATS).forEach(k => {
            const el = document.getElementById('cnt-' + k);
            if (el) el.textContent = counts[k] || 0;
        });
    } catch(e) { console.warn(e); }
}

// ── Boot ─────────────────────────────────────────
function init(imgW, imgH) {
    W = imgW; H = imgH;
    map = L.map('map', {
        crs: L.CRS.Simple, minZoom:-2, maxZoom:3,
        maxBounds:[[0,0],[H,W]], maxBoundsViscosity:0.9
    });
    L.imageOverlay('harta.png', [[0,0],[H,W]]).addTo(map);
    map.setView([H/2, W/2], -1);

    Object.keys(CATS).forEach(k => {
        layers[k] = L.layerGroup().addTo(map);
        roadOverlays[k] = {};
        counts[k] = 0;
        visible[k] = true;
    });

    buildSidebar();
    fetchCSV();
    setInterval(fetchCSV, 3000);
}

const img = new Image();
img.onload = function() { init(this.width, this.height); };
img.onerror = function() { init(2048, 1536); };
img.src = 'harta.png?v=' + Date.now();
</script>
</body>
</html>
