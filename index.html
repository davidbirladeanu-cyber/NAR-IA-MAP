<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narția Hartă</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-dark: #101010;
            --bg-sidebar: #1a1a1a;
            --border: #2c2c2c;
            --text: #e5e5e5;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: var(--bg-dark); color: var(--text);
            overflow: hidden;
        }

        #app { display: flex; width: 100vw; height: 100vh; }

        #sidebar {
            width: 320px; background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 1000;
        }

        .section-header {
            padding: 20px; border-bottom: 1px solid var(--border);
            font-size: 1rem; font-weight: bold; letter-spacing: 1px;
            text-align: center;
        }

        .categories-list { flex-grow: 1; overflow-y: auto; padding: 20px; }
        
        .cat-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px; background: var(--bg-dark);
            margin-bottom: 8px; border-radius: 4px;
            box-sizing: border-box;
        }
        .cat-label { display: flex; align-items: center; gap: 10px; cursor: pointer; width: 100%; }

        #map { flex-grow: 1; height: 100%; background-color: #0b0c10; }

        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: var(--bg-sidebar); color: var(--text);
            border: 1px solid var(--border); border-radius: 4px;
            font-family: 'Consolas', monospace;
        }

        .custom-pin-icon {
            background: none !important;
            border: none !important;
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="sidebar">
            <div class="section-header">NARȚIA HARTĂ</div>
            <div class="categories-list" id="categories-container"></div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- CALIBRARE MATEMATICĂ FINALĂ ---
        const imgWidth = 1440;
        const imgHeight = 1080;
        const bounds = [[0, 0], [imgHeight, imgWidth]];

        // Ancorăm centrul vizual al imaginii de centrul exact din joc
        const centerImgX = imgWidth / 2;  // 720
        const centerImgY = imgHeight / 2; // 540
        const centerGameX = 70;
        const centerGameZ = 226;

        // Calculăm câte blocuri intră într-un singur pixel (bazat pe extreme)
        // Lățime totală blocuri: de la -1345 la 1500 = 2845 blocuri
        // Înălțime totală blocuri: de la -840 la 1250 = 2090 blocuri
        const scaleX = 2845 / imgWidth;  // ~ 1.975
        const scaleZ = 2090 / imgHeight; // ~ 1.935

        function minecraftToLeaflet(x, z) {
            // Calculăm poziția exactă față de centrul ancorat
            const lng = centerImgX + (x - centerGameX) / scaleX;
            const lat = centerImgY - (z - centerGameZ) / scaleZ;
            return [lat, lng];
        }

        // --- INIȚIALIZARE HARTĂ ---
        const map = L.map('map', {
            crs: L.CRS.Simple, minZoom: -1, maxZoom: 2,
            maxBounds: bounds, maxBoundsViscosity: 1.0
        });

        // Adăugăm un parametru de versiune pentru a sparge cache-ul și a forța actualizarea imaginii
        const currentVersion = new Date().getTime();
        L.imageOverlay('image_d8de1d.jpg?v=' + currentVersion, bounds).addTo(map);
        map.setView([centerImgY, centerImgX], 0);

        const layers = {
            orase: L.layerGroup().addTo(map),
            sate: L.layerGroup().addTo(map),
            baze: L.layerGroup().addTo(map),
            structuri: L.layerGroup().addTo(map),
            metro: L.layerGroup().addTo(map),
            port: L.layerGroup().addTo(map)
        };

        const categoriesMap = {
            orase: "Orașe",
            sate: "Sate",
            baze: "Baze",
            structuri: "Structuri",
            metro: "Metro",
            port: "Porturi"
        };

        const colorMap = {
            orase: "#ff4d4d",      
            sate: "#ff944d",       
            baze: "#ffeb3b",       
            structuri: "#4caf50",  
            metro: "#2196f3",      
            port: "#ba68c8"        
        };

        let lastFileContent = "";

        // Generare Pin cu stroke negru de contrast
        function createPinIcon(color) {
            return L.divIcon({
                html: `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" 
                              fill="${color}" 
                              stroke="#000000" 
                              stroke-width="1" 
                              stroke-linejoin="round"/>
                       </svg>`,
                className: 'custom-pin-icon',
                iconSize: [26, 26],
                iconAnchor: [13, 26],
                popupAnchor: [0, -26]
            });
        }

        // --- SIDEBAR UI ---
        function initSidebar() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';
            Object.keys(categoriesMap).forEach(key => {
                const color = colorMap[key];
                container.innerHTML += `
                    <div class="cat-item" style="border-left: 4px solid ${color};">
                        <label class="cat-label" for="chk-${key}">
                            <input type="checkbox" id="chk-${key}" checked onchange="toggleLayer('${key}')">
                            <span style="color: ${color}; font-weight: bold;">${categoriesMap[key]}</span>
                        </label>
                    </div>`;
            });
        }

        function toggleLayer(key) {
            if (map.hasLayer(layers[key])) { map.removeLayer(layers[key]); } 
            else { layers[key].addTo(map); }
        }

        function renderMarker(point) {
            const coords = minecraftToLeaflet(point.x, point.z);
            if (!layers[point.category]) return; 

            const targetColor = colorMap[point.category];
            const customIcon = createPinIcon(targetColor);

            L.marker(coords, { icon: customIcon })
                .bindPopup(`<b style="color:${targetColor};">${point.name}</b><br>Coordonate: X: ${point.x} | Z: ${point.z}<br>Tip: ${categoriesMap[point.category]}`)
                .addTo(layers[point.category]);
        }

        // --- AUTO-SYNC LOGIC ---
        async function fetchLocalCSV() {
            try {
                // Adăugăm timestamp pentru a forța browserul să nu citească din cache
                const response = await fetch('./nartia_date.csv?t=' + new Date().getTime(), { cache: "no-store" });
                if (!response.ok) throw new Error("Fișierul nu a fost găsit.");

                const text = await response.text();
                if (text === lastFileContent) return;
                lastFileContent = text;

                Object.keys(layers).forEach(key => layers[key].clearLayers());

                const lines = text.split("\n");
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;

                    const parts = line.split(",");
                    if (parts.length === 4) {
                        renderMarker({
                            name: parts[0],
                            category: parts[1],
                            x: parseFloat(parts[2]),
                            z: parseFloat(parts[3])
                        });
                    }
                }
            } catch (error) {
                console.warn("Sincronizarea automată eșuată. Necesită rulare prin Live Server local.");
            }
        }

        initSidebar();
        fetchLocalCSV();
        setInterval(fetchLocalCSV, 3000);
    </script>
</body>
</html>
