<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narția Hartă</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-dark: #101010;
            --bg-sidebar: #1a1a1a;
            --border: #2c2c2c;
            --text: #e5e5e5;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: var(--bg-dark); color: var(--text);
            overflow: hidden;
        }

        #app { display: flex; width: 100vw; height: 100vh; }

        #sidebar {
            width: 320px; background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 1000;
        }

        .section-header {
            padding: 20px; border-bottom: 1px solid var(--border);
            font-size: 1rem; font-weight: bold; letter-spacing: 1px;
            text-align: center;
        }

        .categories-list { flex-grow: 1; overflow-y: auto; padding: 20px; }
        
        .cat-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px; background: var(--bg-dark);
            margin-bottom: 8px; border-radius: 4px;
            box-sizing: border-box;
        }
        .cat-label { display: flex; align-items: center; gap: 10px; cursor: pointer; width: 100%; }

        #map { flex-grow: 1; height: 100%; background-color: #0b0c10; }

        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: var(--bg-sidebar); color: var(--text);
            border: 1px solid var(--border); border-radius: 4px;
            font-family: 'Consolas', monospace;
        }

        .custom-pin-icon { background: none !important; border: none !important; }
    </style>
</head>
<body>

    <div id="app">
        <div id="sidebar">
            <div class="section-header">NARȚIA HARTĂ</div>
            <div class="categories-list" id="categories-container"></div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const imgWidth = 2048; const imgHeight = 1536;
        const bounds = [[0, 0], [imgHeight, imgWidth]];
        const centerImgX = 1024; const centerImgY = 768;
        
        // Coordonate recalibrate pe baza ancorelor tale
        const scaleX = 1.39476664;
        const scaleZ = 1.42079143;
        const centerGameX = 59.3321312;
        const centerGameZ = 218.764228;

        function minecraftToLeaflet(x, z) {
            const lng = centerImgX + (x - centerGameX) / scaleX;
            const lat = centerImgY - (z - centerGameZ) / scaleZ;
            return [lat, lng];
        }

        const map = L.map('map', {
            crs: L.CRS.Simple, minZoom: -1, maxZoom: 2,
            maxBounds: bounds, maxBoundsViscosity: 1.0
        });

        L.imageOverlay('image_d8de1d.jpg', bounds).addTo(map);
        map.setView([centerImgY, centerImgX], 0);

        const layers = {
            orase: L.layerGroup().addTo(map),
            sate: L.layerGroup().addTo(map),
            baze: L.layerGroup().addTo(map),
            structuri: L.layerGroup().addTo(map),
            metro: L.layerGroup().addTo(map),
            port: L.layerGroup().addTo(map)
        };

        const categoriesMap = {
            orase: "Orașe", sate: "Sate", baze: "Baze", 
            structuri: "Structuri", metro: "Metro", port: "Porturi"
        };

        const colorMap = {
            orase: "#ff4d4d", sate: "#ff944d", baze: "#ffeb3b", 
            structuri: "#4caf50", metro: "#2196f3", port: "#ba68c8"
        };

        let lastFileContent = "";

        function createPinIcon(color) {
            return L.divIcon({
                html: `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" 
                              fill="${color}" stroke="#000000" stroke-width="1" stroke-linejoin="round"/>
                       </svg>`,
                className: 'custom-pin-icon',
                iconSize: [26, 26], iconAnchor: [13, 26], popupAnchor: [0, -26]
            });
        }

        function initSidebar() {
            const container = document.getElementById('categories-container');
            Object.keys(categoriesMap).forEach(key => {
                const color = colorMap[key];
                container.innerHTML += `
                    <div class="cat-item" style="border-left: 4px solid ${color};">
                        <label class="cat-label"><input type="checkbox" checked onchange="toggleLayer('${key}')">
                            <span style="color: ${color}; font-weight: bold;">${categoriesMap[key]}</span>
                        </label>
                    </div>`;
            });
        }

        function toggleLayer(key) {
            if (map.hasLayer(layers[key])) map.removeLayer(layers[key]);
            else layers[key].addTo(map);
        }

        function renderMarker(point) {
            const coords = minecraftToLeaflet(point.x, point.z);
            if (!layers[point.category]) return; 
            L.marker(coords, { icon: createPinIcon(colorMap[point.category]) })
             .bindPopup(`<b style="color:${colorMap[point.category]};">${point.name}</b>`)
             .addTo(layers[point.category]);
        }

        async function fetchLocalCSV() {
            try {
                const res = await fetch('./nartia_date.csv', { cache: "no-store" });
                const text = await res.text();
                if (text === lastFileContent) return;
                lastFileContent = text;
                Object.keys(layers).forEach(k => layers[k].clearLayers());
                text.split("\n").forEach((line, i) => {
                    if (i === 0 || !line.trim()) return;
                    const [name, category, x, z] = line.split(",");
                    renderMarker({name, category, x: parseFloat(x), z: parseFloat(z)});
                });
            } catch(e) {}
        }

        initSidebar();
        fetchLocalCSV();
        setInterval(fetchLocalCSV, 3000);
    </script>
</body>
</html>
