<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narția — Hartă</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #0e0e10;
            --panel:    #141416;
            --line:     #222226;
            --line2:    #2a2a2f;
            --text:     #e2e2e4;
            --muted:    #5a5a62;
            --dim:      #3a3a42;
        }

        html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

        #app { display: flex; width: 100vw; height: 100vh; }

        /* ── Sidebar ── */
        #sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--panel);
            border-right: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .s-head {
            padding: 22px 20px 18px;
            border-bottom: 1px solid var(--line);
        }
        .s-title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text);
        }
        .s-sub {
            margin-top: 3px;
            font-size: 11px;
            color: var(--muted);
        }

        .s-section {
            padding: 16px 20px 8px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .s-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 12px;
            scrollbar-width: thin;
            scrollbar-color: var(--line2) transparent;
        }

        .cat-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.1s;
            user-select: none;
        }
        .cat-row:hover { background: var(--line); }
        .cat-row.off { opacity: 0.35; }

        .cat-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .cat-name {
            flex: 1;
            font-size: 13px;
            color: var(--text);
        }

        .cat-count {
            font-size: 11px;
            color: var(--muted);
            min-width: 16px;
            text-align: right;
        }

        /* ── Footer ── */
        .s-foot {
            padding: 14px 20px;
            border-top: 1px solid var(--line);
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 11px;
            color: var(--muted);
        }
        .pulse {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #3dba6f;
            animation: pulse 2.4s ease infinite;
        }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

        /* ── Map ── */
        #map { flex: 1; height: 100%; background: var(--bg); }

        /* ── Leaflet popup override ── */
        .leaflet-popup-content-wrapper {
            background: var(--panel) !important;
            border: 1px solid var(--line2) !important;
            border-radius: 10px !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7) !important;
            padding: 0 !important;
            overflow: hidden !important;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
            min-width: 210px;
            max-width: 250px;
        }
        .leaflet-popup-content { margin: 0 !important; width: 100% !important; }
        .leaflet-popup-tip-container { display: none; }
        .leaflet-popup-close-button {
            color: var(--muted) !important;
            font-size: 16px !important;
            right: 8px !important;
            top: 8px !important;
            z-index: 10;
        }
        .leaflet-popup-close-button:hover { color: var(--text) !important; }

        /* ── Popup card ── */
        .pc { display: flex; flex-direction: column; }

        .pc-accent { height: 3px; width: 100%; }

        .pc-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
            background: var(--bg);
        }
        .pc-img-ph {
            width: 100%;
            height: 72px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pc-body { padding: 14px 16px 16px; }

        .pc-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 2px 7px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .pc-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.25;
            margin-bottom: 12px;
        }

        .pc-sep { height: 1px; background: var(--line); margin-bottom: 10px; }

        .pc-row {
            display: flex;
            align-items: baseline;
            gap: 6px;
            margin-bottom: 5px;
            font-size: 12px;
        }
        .pc-label { color: var(--muted); min-width: 68px; flex-shrink: 0; }
        .pc-val { color: var(--text); font-variant-numeric: tabular-nums; }

        .custom-pin { background: none !important; border: none !important; }
    </style>
</head>
<body>
<div id="app">
    <div id="sidebar">
        <div class="s-head">
            <div class="s-title">Narția</div>
            <div class="s-sub">Hartă interactivă</div>
        </div>
        <div class="s-section">Categorii</div>
        <div class="s-list" id="cat-list"></div>
        <div class="s-foot">
            <div class="pulse"></div>
            <span>Sincronizat live</span>
        </div>
    </div>
    <div id="map"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const minX=-1344, maxX=1487, minZ=-880, maxZ=1247;

const CATS = {
    oras:      { label: 'Orașe',     color: '#e05555' },
    sat:       { label: 'Sate',      color: '#e09045' },
    baza:      { label: 'Baze',      color: '#c8b840' },
    structura: { label: 'Structuri', color: '#4ea86a' },
    metro:     { label: 'Metrouri', color: '#5590de' },
    port:      { label: 'Porturi',  color: '#9966d4' },
    pod:       { label: 'Poduri',   color: '#cc5090' }
};

let map, layers = {}, counts = {}, visible = {}, lastCSV = '';

function pin(color, size) {
    const s = size || 24;
    return L.divIcon({
        html: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="${color}"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="none" stroke="rgba(0,0,0,0.35)" stroke-width="0.7"/></svg>`,
        className: 'custom-pin',
        iconSize: [s,s], iconAnchor: [s/2,s], popupAnchor: [0,-s]
    });
}

function fmtDate(raw) {
    if (!raw || !raw.trim()) return null;
    const s = raw.trim().replace(/\D/g,'');
    if (s.length === 8) {
        const mo = ['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec'];
        return `${parseInt(s.slice(0,2))} ${mo[parseInt(s.slice(2,4))-1] || s.slice(2,4)} ${s.slice(4)}`;
    }
    return raw.trim();
}

function popup(p) {
    const c = CATS[p.cat] || { label: p.cat, color: '#888' };
    const col = c.color;
    const colAlpha = col + '22';
    const date = fmtDate(p.date);
    const hasImg = p.img && p.img.trim();

    const imgHtml = hasImg
        ? `<img class="pc-img" src="${p.img.trim()}" alt="${p.name}" onerror="this.style.display='none'">`
        : `<div class="pc-img-ph"><svg width="28" height="28" viewBox="0 0 24 24" fill="${col}" opacity="0.18"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg></div>`;

    return `<div class="pc">
        <div class="pc-accent" style="background:${col};"></div>
        ${imgHtml}
        <div class="pc-body">
            <div class="pc-badge" style="background:${colAlpha}; color:${col};">${c.label}</div>
            <div class="pc-name">${p.name}</div>
            <div class="pc-sep"></div>
            <div class="pc-row"><span class="pc-label">Coordonate</span><span class="pc-val">X ${p.x} · Z ${p.z}</span></div>
            ${date ? `<div class="pc-row"><span class="pc-label">Construit</span><span class="pc-val">${date}</span></div>` : ''}
        </div>
    </div>`;
}

function buildSidebar() {
    const list = document.getElementById('cat-list');
    list.innerHTML = '';
    Object.keys(CATS).forEach(k => {
        const row = document.createElement('div');
        row.className = 'cat-row';
        row.id = 'row-' + k;
        row.innerHTML = `<div class="cat-dot" style="background:${CATS[k].color};"></div><span class="cat-name">${CATS[k].label}</span><span class="cat-count" id="cnt-${k}">0</span>`;
        row.addEventListener('click', () => toggle(k));
        list.appendChild(row);
    });
}

function toggle(k) {
    visible[k] = !visible[k];
    const row = document.getElementById('row-' + k);
    if (visible[k]) { layers[k].addTo(map); row.classList.remove('off'); }
    else { map.removeLayer(layers[k]); row.classList.add('off'); }
}

function mc2ll(x, z, W, H) {
    return [H - ((z - minZ) / (maxZ - minZ)) * H, ((x - minX) / (maxX - minX)) * W];
}

async function fetchCSV(W, H) {
    try {
        const r = await fetch('./nartia_date.csv?t=' + Date.now(), { cache:'no-store' });
        if (!r.ok) return;
        const text = await r.text();
        if (text === lastCSV) return;
        lastCSV = text;

        Object.keys(CATS).forEach(k => { layers[k].clearLayers(); counts[k] = 0; });

        text.split('\n').slice(1).forEach(line => {
            line = line.trim();
            if (!line || line.startsWith('///')) return;
            const p = line.split(',');
            if (p.length < 4) return;
            const pt = { name: p[0].trim(), cat: p[1].trim(), x: +p[2], z: +p[3], date: p[4]||'', img: p[5]||'' };
            if (!layers[pt.cat]) return;
            const sz = pt.cat === 'oras' ? 28 : pt.cat === 'sat' ? 24 : 22;
            L.marker(mc2ll(pt.x, pt.z, W, H), { icon: pin(CATS[pt.cat]?.color || '#888', sz) })
                .bindPopup(popup(pt), { maxWidth: 250 })
                .addTo(layers[pt.cat]);
            counts[pt.cat] = (counts[pt.cat] || 0) + 1;
        });

        Object.keys(CATS).forEach(k => {
            const el = document.getElementById('cnt-' + k);
            if (el) el.textContent = counts[k] || 0;
        });
    } catch(e) {}
}

const img = new Image();
img.onload = function() {
    const W = this.width, H = this.height;
    map = L.map('map', { crs: L.CRS.Simple, minZoom:-2, maxZoom:3, maxBounds:[[0,0],[H,W]], maxBoundsViscosity:0.9 });
    L.imageOverlay('harta.png', [[0,0],[H,W]]).addTo(map);
    map.setView([H/2, W/2], -1);
    Object.keys(CATS).forEach(k => { layers[k] = L.layerGroup().addTo(map); counts[k] = 0; visible[k] = true; });
    buildSidebar();
    fetchCSV(W, H);
    setInterval(() => fetchCSV(W, H), 3000);
};
img.onerror = function() {
    const W=2048, H=1536;
    map = L.map('map', { crs: L.CRS.Simple, minZoom:-2, maxZoom:3, maxBounds:[[0,0],[H,W]], maxBoundsViscosity:0.9 });
    map.setView([H/2, W/2], -1);
    Object.keys(CATS).forEach(k => { layers[k] = L.layerGroup().addTo(map); counts[k] = 0; visible[k] = true; });
    buildSidebar();
    fetchCSV(W, H);
    setInterval(() => fetchCSV(W, H), 3000);
};
img.src = 'harta.png?v=' + Date.now();
</script>
</body>
</html>
